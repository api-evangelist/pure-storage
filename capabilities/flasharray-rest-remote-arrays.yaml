naftiko: 1.0.0-alpha2
info:
  label: FlashArray REST API — Remote Arrays
  description: 'FlashArray REST API — Remote Arrays. 1 operations. Lead operation: Pure Storage List Remote Arrays. Self-contained
    Naftiko capability covering one Pure Storage business surface.'
  tags:
  - Pure Storage
  - Remote Arrays
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PURE_STORAGE_API_KEY: PURE_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: flasharray-rest-remote-arrays
    baseUri: ''
    description: FlashArray REST API — Remote Arrays business capability. Self-contained, no shared references.
    resources:
    - name: api-2.52-remote-arrays
      path: /api/2.52/remote-arrays
      operations:
      - name: get
        method: GET
        description: Pure Storage List Remote Arrays
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: current_fleet_only
          in: query
          type: boolean
          description: If current_fleet_only is specified, then results will only show arrays from the same fleet to
  exposes:
  - type: rest
    namespace: flasharray-rest-remote-arrays-rest
    port: 8080
    description: REST adapter for FlashArray REST API — Remote Arrays. One Spectral-compliant resource per consumed operation,
