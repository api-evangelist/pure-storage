      this capability's consumes block.
    tools:
    - name: pure-storage-list-remote-arrays
      description: Pure Storage List Remote Arrays
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flasharray-rest-remote-arrays.get
      with:
        current_fleet_only: tools.current_fleet_only
      outputParameters:
      - type: object
        mapping: $.
