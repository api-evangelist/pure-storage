      name: api-2-52-remote-arrays
      description: REST surface for api-2.52-remote-arrays.
      operations:
      - method: GET
        name: get
        description: Pure Storage List Remote Arrays
        call: flasharray-rest-remote-arrays.get
        with:
          current_fleet_only: rest.current_fleet_only
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
