naftiko: 1.0.0-alpha2
info:
  label: FlashBlade REST API — SMTP
  description: 'FlashBlade REST API — SMTP. 2 operations. Lead operation: Pure Storage GET Smtp-servers. Self-contained Naftiko
    capability covering one Pure Storage business surface.'
  tags:
  - Pure Storage
  - SMTP
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PURE_STORAGE_API_KEY: PURE_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: flashblade-rest-smtp
    baseUri: http://[array]
    description: FlashBlade REST API — SMTP business capability. Self-contained, no shared references.
    resources:
    - name: api-2.26-smtp-servers
      path: /api/2.26/smtp-servers
      operations:
      - name: get
        method: GET
        description: Pure Storage GET Smtp-servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patch
        method: PATCH
        description: Pure Storage PATCH Smtp-servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-auth-token
      value: '{{env.PURE_STORAGE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: flashblade-rest-smtp-rest
    port: 8080
    description: REST adapter for FlashBlade REST API — SMTP. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/2-26/smtp-servers
      name: api-2-26-smtp-servers
      description: REST surface for api-2.26-smtp-servers.
      operations:
      - method: GET
        name: get
        description: Pure Storage GET Smtp-servers
        call: flashblade-rest-smtp.get
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Pure Storage PATCH Smtp-servers
        call: flashblade-rest-smtp.patch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flashblade-rest-smtp-mcp
    port: 9090
    transport: http
    description: MCP adapter for FlashBlade REST API — SMTP. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: pure-storage-get-smtp-servers
      description: Pure Storage GET Smtp-servers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flashblade-rest-smtp.get
      outputParameters:
      - type: object
        mapping: $.
    - name: pure-storage-patch-smtp-servers
      description: Pure Storage PATCH Smtp-servers
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: flashblade-rest-smtp.patch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
