naftiko: 1.0.0-alpha2
info:
  label: Pure1 Public REST API — Authorization
  description: 'Pure1 Public REST API — Authorization. 1 operations. Lead operation: Pure Storage Get Access Token. Self-contained
    Naftiko capability covering one Pure Storage business surface.'
  tags:
  - Pure Storage
  - Authorization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PURE_STORAGE_API_KEY: PURE_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: pure1-cloud-authorization
    baseUri: https://api-staging.pure1.purestorage.com
    description: Pure1 Public REST API — Authorization business capability. Self-contained, no shared references.
    resources:
    - name: oauth2-1.0-token
      path: /oauth2/1.0/token
      operations:
      - name: post
        method: POST
        description: Pure Storage Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Request-ID
          in: header
          type: string
          description: Supplied by client during request or generated by server.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PURE_STORAGE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pure1-cloud-authorization-rest
    port: 8080
    description: REST adapter for Pure1 Public REST API — Authorization. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth2/1-0/token
      name: oauth2-1-0-token
      description: REST surface for oauth2-1.0-token.
      operations:
      - method: POST
        name: post
        description: Pure Storage Get Access Token
        call: pure1-cloud-authorization.post
        with:
          X-Request-ID: rest.X-Request-ID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pure1-cloud-authorization-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pure1 Public REST API — Authorization. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: pure-storage-get-access-token
      description: Pure Storage Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: pure1-cloud-authorization.post
      with:
        X-Request-ID: tools.X-Request-ID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
