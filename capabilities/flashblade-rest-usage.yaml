naftiko: 1.0.0-alpha2
info:
  label: FlashBlade REST API — Usage
  description: 'FlashBlade REST API — Usage. 2 operations. Lead operation: Pure Storage GET Usage/groups. Self-contained Naftiko
    capability covering one Pure Storage business surface.'
  tags:
  - Pure Storage
  - Usage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PURE_STORAGE_API_KEY: PURE_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: flashblade-rest-usage
    baseUri: http://[array]
    description: FlashBlade REST API — Usage business capability. Self-contained, no shared references.
    resources:
    - name: api-2.26-usage-groups
      path: /api/2.26/usage/groups
      operations:
      - name: get
        method: GET
        description: Pure Storage GET Usage/groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-2.26-usage-users
      path: /api/2.26/usage/users
      operations:
      - name: get
        method: GET
        description: Pure Storage GET Usage/users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-auth-token
      value: '{{env.PURE_STORAGE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: flashblade-rest-usage-rest
    port: 8080
    description: REST adapter for FlashBlade REST API — Usage. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/2-26/usage/groups
      name: api-2-26-usage-groups
      description: REST surface for api-2.26-usage-groups.
      operations:
      - method: GET
        name: get
        description: Pure Storage GET Usage/groups
        call: flashblade-rest-usage.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/2-26/usage/users
      name: api-2-26-usage-users
      description: REST surface for api-2.26-usage-users.
      operations:
      - method: GET
        name: get
        description: Pure Storage GET Usage/users
        call: flashblade-rest-usage.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flashblade-rest-usage-mcp
    port: 9090
    transport: http
    description: MCP adapter for FlashBlade REST API — Usage. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pure-storage-get-usage-groups
      description: Pure Storage GET Usage/groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flashblade-rest-usage.get
      outputParameters:
      - type: object
        mapping: $.
    - name: pure-storage-get-usage-users
      description: Pure Storage GET Usage/users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flashblade-rest-usage.get
      outputParameters:
      - type: object
        mapping: $.
