naftiko: 1.0.0-alpha2
info:
  label: FlashBlade REST API — Drives
  description: 'FlashBlade REST API — Drives. 1 operations. Lead operation: Pure Storage GET Drives. Self-contained Naftiko
    capability covering one Pure Storage business surface.'
  tags:
  - Pure Storage
  - Drives
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PURE_STORAGE_API_KEY: PURE_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: flashblade-rest-drives
    baseUri: http://[array]
    description: FlashBlade REST API — Drives business capability. Self-contained, no shared references.
    resources:
    - name: api-2.26-drives
      path: /api/2.26/drives
      operations:
      - name: get
        method: GET
        description: Pure Storage GET Drives
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-auth-token
      value: '{{env.PURE_STORAGE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: flashblade-rest-drives-rest
    port: 8080
    description: REST adapter for FlashBlade REST API — Drives. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/2-26/drives
      name: api-2-26-drives
      description: REST surface for api-2.26-drives.
      operations:
      - method: GET
        name: get
        description: Pure Storage GET Drives
        call: flashblade-rest-drives.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flashblade-rest-drives-mcp
    port: 9090
    transport: http
    description: MCP adapter for FlashBlade REST API — Drives. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pure-storage-get-drives
      description: Pure Storage GET Drives
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flashblade-rest-drives.get
      outputParameters:
      - type: object
        mapping: $.
