naftiko: 1.0.0-alpha2
info:
  label: Pure1 Public REST API — Ports
  description: 'Pure1 Public REST API — Ports. 1 operations. Lead operation: Pure Storage Get Ports. Self-contained Naftiko
    capability covering one Pure Storage business surface.'
  tags:
  - Pure Storage
  - Ports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PURE_STORAGE_API_KEY: PURE_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: pure1-cloud-ports
    baseUri: https://api-staging.pure1.purestorage.com
    description: Pure1 Public REST API — Ports business capability. Self-contained, no shared references.
    resources:
    - name: api-1.5-ports
      path: /api/1.5/ports
      operations:
      - name: get
        method: GET
        description: Pure Storage Get Ports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PURE_STORAGE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pure1-cloud-ports-rest
    port: 8080
    description: REST adapter for Pure1 Public REST API — Ports. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/1-5/ports
      name: api-1-5-ports
      description: REST surface for api-1.5-ports.
      operations:
      - method: GET
        name: get
        description: Pure Storage Get Ports
        call: pure1-cloud-ports.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pure1-cloud-ports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pure1 Public REST API — Ports. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pure-storage-get-ports
      description: Pure Storage Get Ports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pure1-cloud-ports.get
      outputParameters:
      - type: object
        mapping: $.
