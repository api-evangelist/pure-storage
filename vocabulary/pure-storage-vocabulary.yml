capability:
  workflows:
  - name: Pure Storage Fleet Management
    file: capabilities/storage-fleet-management.yaml
    description: Unified workflow combining FlashArray, FlashBlade, and Pure1 for fleet-wide storage administration.
    apis:
    - flasharray-rest-api
    - flashblade-rest-api
    - pure1-cloud-api
    tools: 12
    persona: Storage Administrator
    domains:
    - Block Storage
    - File Storage
    - Object Storage
    - Fleet Telemetry
  personas:
  - id: storage-administrator
    name: Storage Administrator
    description: Manages day-to-day Pure Storage block, file, and object storage and the array fleet.
    workflows:
    - Pure Storage Fleet Management
  - id: platform-engineer
    name: Platform Engineer
    description: Operates Portworx and underlying Pure infrastructure for Kubernetes-based applications.
    workflows:
    - Pure Storage Fleet Management
  - id: sre
    name: Site Reliability Engineer
    description: Monitors fleet telemetry, alerts, and capacity from Pure1.
    workflows:
    - Pure Storage Fleet Management
  domains:
  - name: Block Storage
    resources:
    - arrays
    - volumes
    - hosts
    - host-groups
    - pods
    - protection-groups
    - volume-snapshots
  - name: File Storage
    resources:
    - file-systems
    - directories
    - quotas
    - file-system-snapshots
  - name: Object Storage
    resources:
    - buckets
    - object-store-accounts
    - object-store-users
    - object-store-virtual-hosts
  - name: Fleet Telemetry
    resources:
    - arrays
    - metrics
    - alerts
    - audits
    - sustainability
    - subscriptions
    - support-contracts
  - name: Kubernetes Data Services
    resources:
    - storageclusters
    - storagenodes
    - portworxdiags
    - portworxxcopyvolumepopulators
  namespaces:
  - type: consumed
    namespace: flasharray-rest-api
    baseUri: https://[array]/api/2.52
  - type: consumed
    namespace: flashblade-rest-api
    baseUri: https://[blade]/api/2.26
  - type: consumed
    namespace: pure1-cloud-api
    baseUri: https://api.pure1.purestorage.com/api/1.5
  - type: rest
    namespace: pure-storage-fleet-rest
    port: 8080
  - type: mcp
    namespace: pure-storage-fleet-mcp
    port: 9090
  binds:
  - name: PURE_FA_API_TOKEN
    description: API token for FlashArray (session x-auth-token).
    workflows:
    - Pure Storage Fleet Management
  - name: PURE_FB_API_TOKEN
    description: API token for FlashBlade (session x-auth-token).
    workflows:
    - Pure Storage Fleet Management
  - name: PURE1_API_TOKEN
    description: OAuth 2.0 token for the Pure1 Public REST API.
    workflows:
    - Pure Storage Fleet Management
