url: https://github.com/api-evangelist/pure-storage/blob/main/apis.yml
name: Pure Storage
type: Index
image: https://avatars.githubusercontent.com/u/8324560
tags:
- Storage
- Data Storage
- Flash Storage
- Enterprise Storage
- Cloud Storage
- Object Storage
- File Storage
- Block Storage
- Kubernetes Storage
- Infrastructure
description: Pure Storage is an American publicly traded technology company specializing in all-flash data storage hardware
  and software products. The company provides enterprise data storage platforms including FlashArray, FlashBlade, and Pure1
  fleet management, along with Portworx for Kubernetes data services. Pure Storage offers REST APIs, SDKs, CRDs, and developer
  tooling that enable programmatic management of storage infrastructure and integration with automation workflows across block,
  file, and object storage.
