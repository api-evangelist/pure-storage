description: >-
  Pure Storage is an American publicly traded technology company specializing in all-flash data storage hardware and
  software products. The company provides enterprise data storage platforms including FlashArray, FlashBlade, and Pure1
  fleet management, along with Portworx for Kubernetes data services. Pure Storage offers REST APIs, SDKs, CRDs, and
  developer tooling that enable programmatic management of storage infrastructure and integration with automation
  workflows across block, file, and object storage.
